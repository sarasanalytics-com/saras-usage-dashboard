name: Daily Dashboard Update

on:
  workflow_dispatch:   # manual "Run workflow" button in GitHub UI (backup use only)
  # schedule disabled — daily update is handled by the local Claude Code scheduled task

jobs:
  update-clickup:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the commit back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run ClickUp update
        env:
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
          CLICKUP_TEAM_ID: '9011000533'
          HTML_FILE: 'index.html'
        run: python scripts/update_clickup.py

      - name: Commit & push if anything changed
        run: |
          git config --global user.email "dashboard-bot@sarasanalytics.com"
          git config --global user.name  "Dashboard Bot"
          git diff --quiet index.html || (
            git add index.html &&
            git commit -m "Auto-update: ClickUp data $(date +'%Y-%m-%d')" &&
            git push
          )
