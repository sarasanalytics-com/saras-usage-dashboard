name: Daily AI Usage Report

on:
  schedule:
    - cron: '30 1 * * *'   # 1:30 AM UTC = 7:00 AM IST (Mon–Sun)
  workflow_dispatch:         # manual "Run workflow" button

permissions:
  contents: write            # needed to push the updated HTML + JSON back

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      # ── 3. Collect external data ──────────────────────────────────────────────
      - name: Collect Cursor / Windsurf / ClickUp data
        env:
          CLICKUP_API_KEY:       ${{ secrets.CLICKUP_API_KEY }}
          CURSOR_BEARER_TOKEN:   ${{ secrets.CURSOR_BEARER_TOKEN }}
          WINDSURF_SERVICE_KEY:  ${{ secrets.WINDSURF_SERVICE_KEY }}
          CLICKUP_TEAM_ID:       '9011000533'
        run: python scripts/collect_data.py

      # ── 4. Patch dashboard HTML + adoption JSON ────────────────────────────────
      - name: Update dashboard HTML and adoption data
        run: python scripts/update_dashboard.py

      # ── 5. Post to Slack ──────────────────────────────────────────────────────
      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL:     'C0B3AA5ERKL'
        run: python scripts/post_slack.py

      # ── 6. Commit & push ──────────────────────────────────────────────────────
      - name: Commit and push changes
        run: |
          git config user.name  "Dashboard Bot"
          git config user.email "dashboard-bot@sarasanalytics.com"
          git add index.html data/saras-daily-adoption.json data/daily_collected.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update $(date -u +'%Y-%m-%d')"
            git push
          fi
