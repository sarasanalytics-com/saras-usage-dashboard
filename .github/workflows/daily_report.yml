name: Daily AI Usage Report

on:
  schedule:
    - cron: '30 1 * * *'   # 1:30 AM UTC = 7:00 AM IST (Mon–Sun)
  workflow_dispatch:         # manual "Run workflow" button
    inputs:
      skip_slack:
        description: 'Skip Slack notification'
        type: boolean
        default: false

permissions:
  contents: write            # needed to push the updated HTML + JSON back

jobs:
  daily-report:
    runs-on: ubuntu-latest
    # Safety net: the whole pipeline normally finishes in a few minutes. Cap it
    # well under the 6h default so a hung collector fails fast instead of
    # silently burning the runner and skipping the daily commit.
    timeout-minutes: 25

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      # ── 3. Collect Claude.ai analytics via Anthropic Analytics API ───────────────
      - name: Collect Claude.ai analytics (API — no browser needed)
        timeout-minutes: 15
        env:
          ANTHROPIC_ANALYTICS_KEY: ${{ secrets.ANTHROPIC_ANALYTICS_KEY }}
          ANTHROPIC_ADMIN_KEY:     ${{ secrets.ANTHROPIC_ADMIN_KEY }}
        run: python scripts/collect_claude_ai.py

      # ── 4. Collect platform.claude.com API agent spend (per API key) ───────────
      - name: Collect API agent spend (platform.claude.com)
        env:
          ANTHROPIC_ADMIN_KEY:     ${{ secrets.ANTHROPIC_ADMIN_KEY }}
          ANTHROPIC_ANALYTICS_KEY: ${{ secrets.ANTHROPIC_ANALYTICS_KEY }}
        run: python scripts/collect_api_agents.py

      # ── 5. Collect Cursor / Windsurf / ClickUp ────────────────────────────────
      # Step-level backstop: the ClickUp fetch self-limits via a wall-clock
      # budget in collect_data.py, but cap the step too so a misbehaving API can
      # never eat the whole job budget again.
      - name: Collect Cursor / Windsurf / ClickUp data
        timeout-minutes: 12
        env:
          CLICKUP_API_KEY:       ${{ secrets.CLICKUP_API_KEY }}
          CURSOR_BEARER_TOKEN:   ${{ secrets.CURSOR_BEARER_TOKEN }}
          WINDSURF_SERVICE_KEY:  ${{ secrets.WINDSURF_SERVICE_KEY }}
          CLICKUP_TEAM_ID:       '3369097'
        run: python scripts/collect_data.py

      # ── 5b. Collect per-month spend history (backfill from Feb) ───────────────
      # Runs AFTER the others so it reads their fresh output (claude_ai_stats +
      # daily_collected) for the current month's live seat counts / Cursor usage.
      - name: Collect monthly spend history (Anthropic cost reports)
        timeout-minutes: 10
        env:
          ANTHROPIC_ADMIN_KEY:     ${{ secrets.ANTHROPIC_ADMIN_KEY }}
          ANTHROPIC_ANALYTICS_KEY: ${{ secrets.ANTHROPIC_ANALYTICS_KEY }}
        run: python scripts/collect_monthly_spend.py

      # ── 5c. Backfill past-month trend snapshots (one-time-ish) ────────────────
      # Fills MONTHLY_SNAPSHOTS for past months still retained by the Analytics
      # API so the trend-line charts show history. Skips months already recorded,
      # so it's cheap after the first successful run. Must precede the HTML patch.
      - name: Backfill monthly trend snapshots
        timeout-minutes: 20
        env:
          ANTHROPIC_ANALYTICS_KEY: ${{ secrets.ANTHROPIC_ANALYTICS_KEY }}
        run: python scripts/backfill_snapshots.py

      # ── 6. Patch dashboard HTML + adoption JSON ────────────────────────────────
      - name: Update dashboard HTML and adoption data
        run: python scripts/update_dashboard.py

      # ── 6b. Guard: never deploy HTML whose inline JS won't parse ───────────────
      # A bad value in a generated block (e.g. a ClickUp title with a newline)
      # can produce invalid JS that breaks the whole page on load. Fail the run
      # here so a broken build is never committed/deployed.
      - name: Validate generated HTML (JS syntax)
        run: |
          python - <<'PY'
          import re
          html = open('index.html', encoding='utf-8').read()
          blocks = re.findall(r'<script(?![^>]*src=)[^>]*>(.*?)</script>', html, flags=re.DOTALL)
          open('/tmp/_dash_check.js', 'w', encoding='utf-8').write('\n;\n'.join(blocks))
          PY
          node --check /tmp/_dash_check.js
          echo "✓ index.html inline JS parses"

      # ── 7. Post to Slack ──────────────────────────────────────────────────────
      - name: Post to Slack
        if: ${{ !inputs.skip_slack }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL:     'C0B3AA5ERKL'
        run: python scripts/post_slack.py

      # ── 8. Commit & push ──────────────────────────────────────────────────────
      - name: Sync index.html → backend/public/index.html
        run: cp index.html backend/public/index.html

      - name: Commit and push changes
        run: |
          git config user.name  "Dashboard Bot"
          git config user.email "dashboard-bot@sarasanalytics.com"
          # Stage every generated data file (data/*.json now includes
          # monthly_snapshots.json) plus the HTML. Staging all of them keeps the
          # working tree clean so the later `git pull --rebase` doesn't abort
          # with "cannot pull with rebase: you have unstaged changes".
          git add index.html backend/public/index.html data/*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update $(date -u +'%Y-%m-%d')"
            git pull --rebase --autostash
            git push
          fi
